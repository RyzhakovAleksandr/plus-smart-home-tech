spring:
  kafka:
    bootstrap-servers: localhost:9092

  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/analyzer
    username: analyzer_user
    password: analyzer_password

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  sql:
    init:
      mode: always

analyzer:
  kafka:
    topics:
      snapshots: telemetry.snapshots.v1
      hub-events: telemetry.hubs.v1

    consumers:
      hub-events:
        group-id: hubEvent-group
        client-id: HubEventConsumer
        enable-auto-commit: false
        auto-offset-reset: earliest

      snapshots:
        group-id: snapshot-group
        client-id: SnapshotsConsumer
        enable-auto-commit: false
        auto-offset-reset: earliest

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

server:
  port: 8083