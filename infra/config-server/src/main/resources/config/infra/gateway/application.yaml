spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: shopping_cart
          uri: lb://shopping-cart
          predicates:
            - Path=/api/v1/shopping-cart/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: GET, POST, PUT, DELETE
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        - id: shopping_store
          uri: lb://shopping-store
          predicates:
            - Path=/api/v1/shopping-store/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: NOT_FOUND, BAD_GATEWAY
                methods: GET
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2

        - id: warehouse
          uri: lb://warehouse
          predicates:
            - Path=/api/v1/warehouse/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: GET, POST, PUT
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 200ms
                  factor: 2

        - id: order
          uri: lb://order
          predicates:
            - Path=/api/v1/order/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: GET, POST, PUT
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        - id: payment
          uri: lb://payment
          predicates:
            - Path=/api/v1/payment/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        - id: delivery
          uri: lb://delivery
          predicates:
            - Path=/api/v1/delivery/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: GET, POST, PUT
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG